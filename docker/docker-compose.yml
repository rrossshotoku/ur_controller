version: '3.8'

services:
  # Development container - build and run the application
  dev:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: ur_controller_dev
    volumes:
      - ..:/workspace                     # Mount source code
      - build-cache:/workspace/build      # Persist build artifacts
    ports:
      - "8080:8080"                        # Web UI server
    networks:
      - ur_network
    stdin_open: true
    tty: true
    cap_add:
      - SYS_PTRACE                        # For GDB debugging
    security_opt:
      - seccomp:unconfined                # For debugging
    depends_on:
      - ursim
    environment:
      - URSIM_HOST=ursim                  # Hostname of URSim container

  # Universal Robots Simulator
  ursim:
    image: universalrobots/ursim_e-series
    container_name: ur_simulator
    environment:
      - ROBOT_MODEL=UR5
    ports:
      - "6080:6080"     # Web VNC - access Polyscope at http://localhost:6080
      - "29999:29999"   # Dashboard server
      - "30001:30001"   # Primary interface
      - "30002:30002"   # Secondary interface
      - "30003:30003"   # Real-time interface
      - "30004:30004"   # RTDE interface
    networks:
      - ur_network
    volumes:
      - ursim-programs:/ursim/programs    # Persist robot programs

networks:
  ur_network:
    driver: bridge

volumes:
  build-cache:
    name: ur_controller_build_cache
  ursim-programs:
    name: ur_controller_ursim_programs
